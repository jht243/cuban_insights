<svg class="brand-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Cuban Insights" role="img">
  <defs>
    <clipPath id="ci-badge"><rect x="1" y="1" width="30" height="30" rx="6"/></clipPath>
  </defs>
  <!-- Cuban flag: 5 horizontal stripes (3 blue, 2 white) with a red triangle hoist -->
  <rect x="1"  y="1"  width="30" height="6" fill="#002A8F" clip-path="url(#ci-badge)"/>
  <rect x="1"  y="7"  width="30" height="6" fill="#FFFFFF" clip-path="url(#ci-badge)"/>
  <rect x="1"  y="13" width="30" height="6" fill="#002A8F" clip-path="url(#ci-badge)"/>
  <rect x="1"  y="19" width="30" height="6" fill="#FFFFFF" clip-path="url(#ci-badge)"/>
  <rect x="1"  y="25" width="30" height="6" fill="#002A8F" clip-path="url(#ci-badge)"/>
  <!-- Red equilateral triangle on the hoist (left edge), bearing the lone star -->
  <polygon points="1,1 15,16 1,31" fill="#CF142B" clip-path="url(#ci-badge)"/>
  <!-- Lone white five-pointed star (La Estrella Solitaria), centered in the triangle -->
  <polygon
    points="6.6,12.4 7.6,15.4 10.7,15.4 8.2,17.3 9.2,20.3 6.6,18.5 4.0,20.3 5.0,17.3 2.5,15.4 5.6,15.4"
    fill="#FFFFFF"
    clip-path="url(#ci-badge)"/>
  <!-- Soft white border for contrast on dark nav backgrounds -->
  <rect x="1" y="1" width="30" height="30" rx="6" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
</svg>
