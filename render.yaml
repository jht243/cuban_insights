# Auto-deploy verification: this comment exists only to force a no-op
# commit that proves the GitHub -> Render webhook is firing on git push.
# If you see deploys appearing with trigger=git after this commit, the
# autoDeploy chain is wired up correctly end-to-end.
services:
  - type: web
    name: cuban-insights
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@cubaninsights.com
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_REPORT_BUCKET
        value: reports
      - key: ELTOQUE_API_KEY
        sync: false
      - key: SITE_URL
        value: https://cubaninsights.com
      - key: SITE_NAME
        value: Cuban Insights
      - key: SITE_OWNER_ORG
        value: Cuban Insights
      - key: LOG_LEVEL
        value: INFO
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: API_RESEND_FROM_EMAIL
        value: jonathan@intake.layer3labs.io
    healthCheckPath: /health

  - type: cron
    name: cij-daily-pipeline
    runtime: python
    # Render schedules cron in UTC. Cuba is UTC-5 standard, UTC-4 DST.
    # 15:00 / 22:00 UTC = 10:00 / 17:00 Havana time during standard time
    # (Nov–Mar) and 11:00 / 18:00 during Cuban DST (Mar–Nov).
    # Re-tune to "0 14,21 * * *" if you want 09:00 / 16:00 Havana time
    # year-round (off by an hour during DST).
    schedule: "0 15,22 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        value: briefing@cubaninsights.com
      - key: NEWSLETTER_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_REPORT_BUCKET
        value: reports
      - key: ELTOQUE_API_KEY
        sync: false
      - key: SITE_URL
        value: https://cubaninsights.com
      - key: SITE_NAME
        value: Cuban Insights
      - key: SITE_OWNER_ORG
        value: Cuban Insights
      - key: LOG_LEVEL
        value: INFO
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: jonathanteplitsky/cuban-insights

# Note: there is intentionally NO dedicated weekly climate cron here.
# run_daily.py runs run_weekly_climate_refresh() automatically on Mondays
# as a built-in safety net (Phase 2c), which is sufficient to keep the
# Investment Climate Tracker scorecard fresh. A separate weekly cron
# would be redundant and cost an extra Starter-plan slot.
